{% extends 'core/base.html' %}

{% block title %}Join the Network | AlumniSphere{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container" style="max-width: 480px;">
        <div class="auth-card">
            <h3 class="fw-bold text-dark text-center mb-1">Create an account</h3>
            <p class="text-muted text-center small mb-4">Join your institution's elite alumni network</p>

            {% if error %}
            <div class="alert alert-danger py-2 px-3 small rounded-3 mb-3" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" id="username" class="form-control-custom" placeholder="chosen_username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" name="email" id="email" class="form-control-custom" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-control-custom" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label for="password_confirm" class="form-label">Confirm Password</label>
                    <input type="password" name="password_confirm" id="password_confirm" class="form-control-custom" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-indigo text-white w-100 py-2 mb-3">Register</button>
            </form>

            <p class="text-center text-muted small mb-0">
                Already have an account? <a href="{% url 'login' %}" class="text-indigo text-decoration-none fw-medium">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
